name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with test dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest --cov=prg_toolbox --cov-report=term-missing

      - name: Run docstring examples
        run: pytest --doctest-modules prg_toolbox/coarse_graining.py prg_toolbox/utils.py prg_toolbox/analysis_tools.py prg_toolbox/observables.py
